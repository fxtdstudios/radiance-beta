# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Radiance v3 — Continuous Integration
#
# Runs on every push and pull-request to main / dev / release branches.
# Matrix: Python 3.9 · 3.10 · 3.11 · 3.12  ×  ubuntu-latest + windows-latest
#
# No GPU, no ComfyUI, no heavy model deps.
# All torch-gated tests self-skip via @unittest.skipUnless(HAS_TORCH, …)
# All ComfyUI imports are stubbed by tests/conftest.py.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

# Cancel in-flight CI runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Use bash for every run step on every OS. Windows runners default to PowerShell,
# where bash line-continuations (\\) and heredocs are syntax errors; git-bash is
# preinstalled on windows-latest, so this keeps the steps portable.
defaults:
  run:
    shell: bash

jobs:
  # Cost control: the full 4-Python x 2-OS matrix runs only on the public repo
  # (Actions is free for public repos). On private mirrors (e.g. radiance-beta)
  # a slim Linux-only matrix keeps usage within the free minute allowance.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          if [ "${{ github.repository }}" = "fxtdstudios/radiance" ]; then
            echo 'matrix={"python-version":["3.9","3.10","3.11","3.12"],"os":["ubuntu-latest","windows-latest"]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"python-version":["3.11","3.12"],"os":["ubuntu-latest"]}' >> "$GITHUB_OUTPUT"
          fi

  # ── Main test matrix ────────────────────────────────────────────────────────
  test:
    name: "pytest · Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    needs: setup
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ── 3. Install test dependencies ────────────────────────────────────────
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pytest>=7.4" \
            "pytest-timeout>=2.1" \
            "pytest-cov>=4.0" \
            "numpy>=1.22" \
            "scipy>=1.9" \
            "Pillow>=9.0" \
            "defusedxml>=0.7" \
            "opencv-python-headless>=4.7" \
            "tqdm>=4.66"

      # ── 4. Run test suite ────────────────────────────────────────────────────
      #    conftest.py stubs torch + all comfy.* imports automatically.
      #    No manual --ignore needed — torch-gated tests self-skip.
      - name: Run tests
        run: |
          # Full suite on the lightweight matrix. torch/OpenEXR/OCIO-gated tests
          # self-skip here; real-dependency coverage runs in the test-full job.
          # These files import torch unconditionally (no effective skip guard), so
          # they cannot pass without real torch — they run in the test-full job
          # below instead of the no-torch lightweight matrix.
          python -m pytest tests/ \
            --ignore=tests/test_dcc_studio.py \
            --ignore=tests/test_hdr_blend_fixes.py \
            --ignore=tests/test_io_functional.py \
            --ignore=tests/test_io_hdr_regression.py \
            --ignore=tests/test_math_transforms.py \
            --ignore=tests/test_radiance_load_image_mask.py \
            --ignore=tests/test_vfx_nodes.py \
            --tb=short \
            --timeout=60 \
            -q \
            --cov=radiance \
            --cov-fail-under=15 \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      # ── 5. Upload coverage (Python 3.11 only to avoid duplicate uploads) ────
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false   # non-blocking until token is configured
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # ── 6. Upload pytest log on failure ─────────────────────────────────────
      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "pytest-log-py${{ matrix.python-version }}"
          path: |
            .pytest_cache/
            coverage.xml
          retention-days: 7

  # ── Full suite with REAL runtime dependencies ───────────────────────────────
  # Installs CPU torch + OpenEXR + OpenColorIO + colour-science so the EXR,
  # color-math, ACES and sampler tests actually execute (they self-skip on the
  # lightweight matrix above). This is the lane that catches HDR/EXR regressions.
  test-full:
    name: "pytest · real deps (torch+OpenEXR+OCIO)"
    if: github.repository == 'fxtdstudios/radiance'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install real runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install \
            "numpy>=1.22" "scipy>=1.9" "Pillow>=9.0" "defusedxml>=0.7" \
            "opencv-python-headless>=4.7" "tqdm>=4.66" \
            "OpenEXR>=3.2.0" \
            "opencolorio>=2.3.0" "colour-science>=0.4.4" \
            "einops>=0.7.0" "pytest>=7.4" "pytest-timeout>=2.1"

      - name: Run full test suite (real deps)
        run: |
          python -m pytest tests/ --tb=short --timeout=120 -q

  # ── Import smoke-test ───────────────────────────────────────────────────────
  # Verifies that pure-Python helpers import cleanly with minimal stubs,
  # independent of the test suite (catches syntax errors, bad imports at
  # module level, etc.)
  smoke:
    name: "Import smoke-test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        run: |
          pip install numpy scipy Pillow defusedxml tqdm

      - name: Smoke-test — module imports
        run: |
          python - << 'EOF'
          import sys, types
          from unittest.mock import MagicMock

          # ── Minimal stubs ──────────────────────────────────────────────────
          _stub_names = [
              "torch", "torch.nn", "torch.nn.functional",
              "comfy", "comfy.samplers", "comfy.sample",
              "comfy.model_management", "comfy.utils", "comfy.model_base",
              "comfy.sd", "comfy.latent_formats", "comfy.nested_tensor",
              "folder_paths",
          ]
          for mod in _stub_names:
              m = types.ModuleType(mod)
              m.__dict__.update({a: MagicMock() for a in dir(MagicMock())})
              # Any attribute we did not set explicitly resolves to a mock, so a
              # module doing e.g. `torch.device(...)` at import time won't crash.
              m.__getattr__ = lambda name: MagicMock()
              sys.modules.setdefault(mod, m)

          # Minimal real attributes needed by our nodes
          sys.modules["torch"].Tensor        = object
          sys.modules["torch"].float32       = "float32"
          sys.modules["torch"].float16       = "float16"
          sys.modules["torch"].bfloat16      = "bfloat16"
          # nn.Module must be a real class so `class X(torch.nn.Module)` works.
          sys.modules["torch.nn"].Module     = MagicMock
          sys.modules["folder_paths"].models_dir      = "/tmp"
          sys.modules["folder_paths"].output_directory = "/tmp"
          sys.modules["comfy.samplers"].SAMPLER_NAMES   = []
          sys.modules["comfy.samplers"].SCHEDULER_NAMES = []

          sys.path.insert(0, ".")

          # Map the import name `radiance` to the checkout root regardless of the
          # repo/dir name (e.g. a mirror checked out as "radiance-beta"), so
          # `import radiance.*` resolves the same way it does in a "radiance" dir.
          import importlib.abc, importlib.util, os
          _ROOT = os.path.abspath(".")
          if os.path.basename(_ROOT) != "radiance" and os.path.exists(os.path.join(_ROOT, "__init__.py")):
              class _RadianceNameFinder(importlib.abc.MetaPathFinder):
                  def find_spec(self, name, path=None, target=None):
                      if name != "radiance":
                          return None
                      return importlib.util.spec_from_file_location(
                          "radiance", os.path.join(_ROOT, "__init__.py"),
                          submodule_search_locations=[_ROOT])
              sys.meta_path.insert(0, _RadianceNameFinder())

          # ── Modules to smoke-test ──────────────────────────────────────────
          _modules = [
              ("radiance.nodes.ai.scene_cut",        "scene_cut"),
              ("radiance.nodes.hdr.aces2",            "aces2"),
              ("radiance.nodes_realtime_preview",    "nodes_realtime_preview"),
              ("radiance.nodes.upscale.upscale",      "upscale"),
              ("radiance.nodes.video.dit",            "dit"),
              ("radiance.nodes.video.character",      "character"),
          ]

          ok = True
          for pkg, label in _modules:
              try:
                  __import__(pkg)
                  print(f"  ✓  {label}")
              except Exception as exc:
                  print(f"  ✗  {label}: {exc}")
                  ok = False

          sys.exit(0 if ok else 1)
          EOF

  # ── YAML / TOML lint ────────────────────────────────────────────────────────
  lint-config:
    name: "Config lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tomllib (stdlib 3.11+) or tomli
        run: pip install tomli

      - name: Validate pyproject.toml
        run: |
          python - << 'EOF'
          import sys
          try:
              import tomllib          # stdlib 3.11+
          except ImportError:
              import tomli as tomllib  # backport
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          assert "project" in data, "Missing [project] table"
          assert "tool" in data,    "Missing [tool] table"
          print("pyproject.toml  OK")
          EOF

      - name: Validate workflow YAML files
        run: |
          python - << 'EOF'
          import sys, pathlib
          try:
              import yaml
          except ImportError:
              print("PyYAML not installed — skipping YAML lint")
              sys.exit(0)
          errors = []
          for p in pathlib.Path(".github/workflows").glob("*.yml"):
              try:
                  yaml.safe_load(p.read_text())
                  print(f"  ✓  {p.name}")
              except Exception as exc:
                  print(f"  ✗  {p.name}: {exc}")
                  errors.append(p.name)
          sys.exit(1 if errors else 0)
          EOF

  # ── Clean wheel build + completeness check ──────────────────────────────────
  # Builds the wheel and verifies every importable package on disk actually made
  # it into the artifact — catches the "new sub-package not added to pyproject"
  # bug that source-tree tests cannot see.
  build-install:
    name: "Build wheel + verify packaging"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Verify wheel contains every source package
        run: |
          python - << 'EOF'
          import os, glob, zipfile, sys

          # Packages present on disk (dirs with __init__.py), as radiance.<dotted>.
          exclude = {"tests", "docs", "build", "dist", "scripts", "examples", "__pycache__"}
          disk = set()
          for dp, dns, fns in os.walk("."):
              dns[:] = [d for d in dns if d not in exclude and not d.startswith(".")]
              rel = os.path.relpath(dp, ".").replace("\\", "/")
              if rel == ".":
                  if "__init__.py" in fns:
                      disk.add("radiance")
                  continue
              if rel.split("/")[0] in exclude:
                  continue
              if "__init__.py" in fns:
                  disk.add("radiance." + rel.replace("/", "."))

          # Packages actually inside the built wheel.
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          in_wheel = set()
          for n in names:
              if n.endswith("/__init__.py"):
                  in_wheel.add(n[:-len("/__init__.py")].replace("/", "."))

          missing = sorted(p for p in disk if p not in in_wheel)
          if missing:
              print("Packages on disk but MISSING from the built wheel:")
              for p in missing:
                  print(f"  {p}")
              sys.exit(1)
          print(f"OK — all {len(disk)} source packages are present in {os.path.basename(whl)}")
          EOF

  # ── Python lint (high-signal: undefined names + syntax) ─────────────────────
  # Advisory for now (continue-on-error) — surfaces real bugs (undefined names,
  # syntax) in the shipped package without blocking merges. Once the existing
  # findings in scripts/ are triaged, drop continue-on-error to make it gating.
  lint:
    name: "Ruff lint (advisory)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff (syntax errors + undefined names; skip tests & dev scripts)
        run: ruff check --isolated --select E9,F82,F63,F7 --exclude tests,scripts .

  # ── Security scan (advisory) ────────────────────────────────────────────────
  # Non-blocking: surfaces dependency CVEs (pip-audit) and common security
  # anti-patterns (bandit) without gating merges. Review findings in the job
  # log; promote to gating once the baseline is clean.
  security:
    name: "Security scan (advisory)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit — dependency CVEs
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt || true

      - name: bandit — static security lint (aiohttp routes, DCC bridge)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r . -x ./tests,./scripts,./tools,./docs,./workflows -ll -q || true
