<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; align-items:center; justify-content:center; padding:20px 0; }

  .splash {
    width: 640px;
    height: 380px;
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    background: #0c0c0c;
    font-family: 'Inter', -apple-system, 'SF Pro Display', sans-serif;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 0.5px rgba(255,255,255,0.06);
  }

  .artwork {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .streak {
    position: absolute;
    border-radius: 999px;
    filter: blur(40px);
    opacity: 0.18;
  }
  .s1 { width:320px; height:80px; background:#7c3aed; top:60px; left:-60px; transform:rotate(-18deg); opacity:0.14; }
  .s2 { width:260px; height:60px; background:#2563eb; top:140px; left:80px; transform:rotate(-18deg); opacity:0.1; }
  .s3 { width:200px; height:50px; background:#db2777; top:200px; left:160px; transform:rotate(-18deg); opacity:0.08; }
  .s4 { width:400px; height:90px; background:#6d28d9; top:40px; right:-80px; transform:rotate(162deg); opacity:0.12; }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(12,12,12,0.85) 100%);
  }

  .left {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 36px;
    border-right: 0.5px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    position: relative;
    margin-bottom: 20px;
  }
  .lm-o { position:absolute; inset:0; border-radius:50%; border:2px solid rgba(220,215,240,0.8); }
  .lm-m { position:absolute; inset:9px; border-radius:50%; border:2px solid rgba(220,215,240,0.8); }
  .lm-d { position:absolute; inset:19px; border-radius:50%; background:rgba(220,215,240,0.8); }

  .app-name {
    font-size: 22px;
    font-weight: 200;
    letter-spacing: 0.2em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 4px;
  }
  .app-sub {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.28);
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 28px;
  }
  .version-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .ver-dot { width:4px; height:4px; border-radius:50%; background:#7c3aed; opacity:0.8; }
  .ver-text {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.22);
    font-weight: 400;
  }

  .right {
    position: absolute;
    left: 220px; top: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 32px 32px;
  }

  .status-label {
    font-size: 9.5px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);
    font-weight: 300;
    margin-bottom: 8px;
  }
  .progress-track {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.07);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, rgba(124,58,237,0.7), rgba(199,180,255,1));
    animation: prog 3s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes prog {
    0%   { width:0% }
    20%  { width:22% }
    45%  { width:50% }
    70%  { width:72% }
    88%  { width:90% }
    100% { width:100% }
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .meta-left {
    font-size: 8.5px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.13);
    text-transform: uppercase;
    font-weight: 400;
    line-height: 1.8;
  }
  .meta-right {
    font-size: 8.5px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.13);
    text-transform: uppercase;
    font-weight: 400;
    text-align: right;
    line-height: 1.8;
  }

  .modules {
    position: absolute;
    top: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: flex-end;
  }
  .mod-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.06);
  }
  .mod-dot { width:4px; height:4px; border-radius:50%; }
  .mod-label {
    font-size: 8px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
  .c-v { background: rgba(124,58,237,0.9); }
  .c-b { background: rgba(37,99,235,0.9); }
  .c-p { background: rgba(219,39,119,0.9); }
</style>
</head>
<body>
<div class="splash">
  <div class="artwork">
    <div class="streak s1"></div>
    <div class="streak s2"></div>
    <div class="streak s3"></div>
    <div class="streak s4"></div>
  </div>
  <div class="vignette"></div>

  <div class="left">
    <div class="logo-mark">
      <div class="lm-o"></div>
      <div class="lm-m"></div>
      <div class="lm-d"></div>
    </div>
    <div class="app-name">Radiance</div>
    <div class="app-sub">Studio</div>
    <div class="version-badge">
      <div class="ver-dot"></div>
      <div class="ver-text">Version 2.0.1 · Build 2460</div>
    </div>
  </div>

  <div class="right">
    <div class="modules">
      <div class="mod-pill"><div class="mod-dot c-v"></div><div class="mod-label">VFX Engine</div></div>
      <div class="mod-pill"><div class="mod-dot c-b"></div><div class="mod-label">Compositor</div></div>
      <div class="mod-pill"><div class="mod-dot c-p"></div><div class="mod-label">3D Pipeline</div></div>
    </div>

    <div class="status-label" id="status">Initializing render engine…</div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="meta-row">
      <div class="meta-left">FXTD Studios<br>© 2026 All rights reserved</div>
      <div class="meta-right">macOS 15 · Metal<br>Licensed to Ahmed</div>
    </div>
  </div>
</div>

<script>
  const msgs = ['Initializing render engine…','Loading VFX modules…','Building node cache…','Connecting GPU pipeline…','Loading color science…','Ready.'];
  let i = 0;
  const el = document.getElementById('status');
  const t = setInterval(() => { i++; if(i>=msgs.length){clearInterval(t);return;} el.textContent=msgs[i]; }, 480);
</script>
</body>
</html>
